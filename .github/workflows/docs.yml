name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for docs-site
        id: probe
        run: |
          if [ -f docs-site/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::docs-site/package.json not found — skipping docs build"
          fi

      - name: Setup pnpm
        if: steps.probe.outputs.present == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        if: steps.probe.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: docs-site/pnpm-lock.yaml

      - name: Install dependencies
        if: steps.probe.outputs.present == 'true'
        working-directory: docs-site
        run: pnpm install --frozen-lockfile=false

      - name: Build site
        if: steps.probe.outputs.present == 'true'
        working-directory: docs-site
        run: pnpm build

      - name: Configure Pages
        if: steps.probe.outputs.present == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.probe.outputs.present == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
