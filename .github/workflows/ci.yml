name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs-site/**'
      - 'docs/**'
      - '**.md'
  pull_request:
    paths-ignore:
      - 'docs-site/**'
      - 'docs/**'
      - '**.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Build + Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test (race)
        run: go test -race -count=1 ./...
      - name: go build
        run: go build ./...
      - name: go build examples
        if: hashFiles('examples/**/*.go') != ''
        run: go build ./examples/...

  staticcheck:
    name: Staticcheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: staticcheck
        run: staticcheck ./...

  gofmt:
    name: gofmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: gofmt check
        run: |
          diff=$(gofmt -d .)
          if [ -n "$diff" ]; then
            echo "$diff"
            echo "gofmt found formatting differences"
            exit 1
          fi

  govulncheck:
    name: govulncheck (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Stdlib CVEs land regularly between Go patch releases. We don't
    # want every weekly advisory to block delivery — the report is
    # surfaced in the run logs and contributors should track upstream
    # patch availability rather than have CI red overnight.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
      - name: go test (coverage)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Function-level coverage summary
        run: go tool cover -func=coverage.out
      - name: Total coverage
        id: total
        run: |
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}')
          echo "coverage=$total" >> "$GITHUB_OUTPUT"
          echo "Total coverage: $total"
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profile
          path: coverage.out
          retention-days: 30
      - name: Post coverage PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          message: |
            ### Test coverage

            **Total:** `${{ steps.total.outputs.coverage }}`

            Download the full `coverage.out` profile from the workflow run artifacts (retained 30 days) and inspect locally with:

            ```
            go tool cover -html=coverage.out
            ```
